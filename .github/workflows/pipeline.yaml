name: Check and Format
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - run: sh install-pre-commit.sh

      - run: .git/hooks/pre-commit

      - uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          message: "formatting"
